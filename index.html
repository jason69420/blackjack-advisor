<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackjack Advisor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');

    :root {
      --felt: #1a3a2a;
      --felt-light: #22472f;
      --gold: #c9a84c;
      --gold-dim: #7a5f28;
      --text: #f0ead8;
      --text-dim: #8a9e8e;
      --red: #c0392b;
      --green: #27ae60;
      --blue: #2980b9;
      --orange: #e67e22;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--felt);
      background-image: radial-gradient(ellipse at top, #1f4a35 0%, #1a3a2a 60%);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 40px;
    }

    header { text-align: center; margin-bottom: 16px; }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      color: var(--gold);
      letter-spacing: 0.02em;
    }
    .suit-row { font-size: 1rem; opacity: 0.4; margin-top: 4px; letter-spacing: 6px; }

    .api-card {
      background: var(--felt-light);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius);
      padding: 14px 16px;
      width: 100%; max-width: 480px;
      margin-bottom: 12px;
    }
    .api-card label {
      display: block;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gold-dim); margin-bottom: 7px;
    }
    .api-row { display: flex; gap: 8px; align-items: center; }

    input[type="password"], input[type="text"] {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 8px; padding: 9px 12px;
      color: var(--text); font-family: monospace; font-size: 0.82rem;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--gold); }

    .toggle-btn {
      background: none; border: 1px solid rgba(201,168,76,0.25);
      border-radius: 8px; color: var(--text-dim);
      padding: 9px 11px; cursor: pointer; font-size: 0.8rem;
      transition: all 0.2s; white-space: nowrap;
    }
    .toggle-btn:hover { border-color: var(--gold); color: var(--gold); }

    .viewfinder-wrap {
      position: relative; width: 100%; max-width: 480px;
      border-radius: var(--radius); overflow: hidden;
      background: #000; border: 2px solid rgba(201,168,76,0.25);
      margin-bottom: 12px; aspect-ratio: 4/3;
    }
    #live-video { width: 100%; height: 100%; object-fit: cover; display: block; }

    .corner {
      position: absolute; width: 22px; height: 22px;
      border-color: var(--gold); border-style: solid; opacity: 0.7;
    }
    .corner.tl { top:10px; left:10px;   border-width: 2px 0 0 2px; }
    .corner.tr { top:10px; right:10px;  border-width: 2px 2px 0 0; }
    .corner.bl { bottom:10px; left:10px;  border-width: 0 0 2px 2px; }
    .corner.br { bottom:10px; right:10px; border-width: 0 2px 2px 0; }

    #no-camera {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 10px;
      text-align: center; padding: 20px;
      color: var(--text-dim); font-size: 0.85rem;
    }
    #no-camera .icon { font-size: 2.5rem; }

    .flash {
      position: absolute; inset: 0; background: #fff;
      opacity: 0; pointer-events: none;
    }
    .flash.go { animation: flashbang 0.25s ease-out forwards; }
    @keyframes flashbang { 0% { opacity: 0.8; } 100% { opacity: 0; } }

    .action-row {
      display: grid; grid-template-columns: 1fr auto;
      gap: 10px; width: 100%; max-width: 480px; margin-bottom: 12px;
    }

    .btn-capture {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 15px;
      background: var(--gold); color: #1a1a1a;
      border: none; border-radius: var(--radius);
      font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.18s; letter-spacing: 0.02em;
    }
    .btn-capture:hover { background: #d4b05a; transform: translateY(-1px); }
    .btn-capture:active { transform: scale(0.97); }
    .btn-capture:disabled {
      background: rgba(201,168,76,0.3); color: rgba(255,255,255,0.3);
      cursor: not-allowed; transform: none;
    }

    .btn-upload-icon {
      display: flex; align-items: center; justify-content: center;
      width: 52px; background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.3); border-radius: var(--radius);
      font-size: 1.4rem; cursor: pointer; transition: all 0.18s;
    }
    .btn-upload-icon:hover { background: rgba(201,168,76,0.22); }
    #upload-input { display: none; }

    #result-card { display: none; width: 100%; max-width: 480px; }

    .result-inner {
      border-radius: var(--radius); padding: 20px 18px;
      text-align: center; border: 2px solid transparent;
      transition: background 0.3s, border-color 0.3s;
    }
    .result-inner.hit    { background: rgba(192,57,43,0.18);  border-color: var(--red);    }
    .result-inner.stand  { background: rgba(39,174,96,0.18);  border-color: var(--green);  }
    .result-inner.double { background: rgba(41,128,185,0.18); border-color: var(--blue);   }
    .result-inner.split  { background: rgba(230,126,34,0.18); border-color: var(--orange); }
    .result-inner.neutral{ background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12); }

    .result-action {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem; font-weight: 700; margin-bottom: 6px;
      min-height: 3.2rem;
    }
    .hit    .result-action { color: var(--red);    }
    .stand  .result-action { color: var(--green);  }
    .double .result-action { color: var(--blue);   }
    .split  .result-action { color: var(--orange); }

    .result-hands {
      display: flex; gap: 8px; justify-content: center; margin-bottom: 12px;
    }
    .hand-chip {
      background: rgba(0,0,0,0.3); border-radius: 8px;
      padding: 5px 12px; font-size: 0.78rem; font-weight: 600; color: var(--text-dim);
    }
    .hand-chip span { color: var(--text); font-size: 0.95rem; }

    .result-reason { font-size: 0.86rem; color: var(--text-dim); line-height: 1.5; }

    /* Streaming text cursor blink */
    .streaming::after {
      content: '▋';
      animation: blink 0.7s step-end infinite;
      color: var(--gold);
    }
    @keyframes blink { 50% { opacity: 0; } }

    .loading {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; padding: 20px; color: var(--text-dim); font-size: 0.88rem;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(201,168,76,0.2);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: rgba(192,57,43,0.15); border: 1px solid var(--red);
      border-radius: 10px; padding: 13px 15px;
      font-size: 0.84rem; color: #e88; line-height: 1.5;
    }

    footer {
      margin-top: 20px; font-size: 0.7rem;
      color: var(--text-dim); text-align: center; opacity: 0.5;
    }

    #snap-canvas { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>Blackjack Advisor</h1>
    <div class="suit-row">♠ ♥ ♦ ♣</div>
  </header>

  <div class="api-card">
    <label>Anthropic API Key</label>
    <div class="api-row">
      <input type="password" id="api-key" placeholder="sk-ant-api03-…" autocomplete="off" />
      <button class="toggle-btn" onclick="toggleKey(event)">Show</button>
    </div>
  </div>

  <div class="viewfinder-wrap" id="viewfinder">
    <video id="live-video" autoplay playsinline muted></video>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="flash" id="flash"></div>
    <div id="no-camera">
      <div class="icon">📷</div>
      <div>Camera not available.<br>Use the upload button below.</div>
    </div>
  </div>

  <div class="action-row">
    <button class="btn-capture" id="capture-btn" onclick="captureAndAnalyze()">
      📸 &nbsp;Snap &amp; Analyze
    </button>
    <label class="btn-upload-icon" title="Upload a photo instead">
      🖼️
      <input type="file" id="upload-input" accept="image/*" onchange="handleUpload(this)" />
    </label>
  </div>

  <div id="result-card">
    <div class="result-inner neutral" id="result-inner"></div>
  </div>

  <canvas id="snap-canvas"></canvas>
  <footer>API key stays on your device — only sent to Anthropic.</footer>

  <script>
    const video      = document.getElementById('live-video');
    const noCam      = document.getElementById('no-camera');
    const captureBtn = document.getElementById('capture-btn');

    // ── Camera ────────────────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } },
          audio: false
        });
        video.srcObject = stream;
      } catch {
        video.style.display = 'none';
        noCam.style.display = 'flex';
        captureBtn.disabled = true;
        captureBtn.textContent = 'Camera unavailable';
      }
    }
    startCamera();

    // ── Capture + resize to 800px wide (much faster upload) ───────
    function captureFrame() {
      const canvas = document.getElementById('snap-canvas');
      const MAX = 800;
      let w = video.videoWidth  || 640;
      let h = video.videoHeight || 480;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(video, 0, 0, w, h);

      const flash = document.getElementById('flash');
      flash.classList.remove('go');
      void flash.offsetWidth;
      flash.classList.add('go');

      // Quality 0.82 — sharp enough for cards, small enough to be fast
      return canvas.toDataURL('image/jpeg', 0.82);
    }

    // Resize an uploaded image the same way
    function resizeDataUrl(dataUrl, callback) {
      const img = new Image();
      img.onload = () => {
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        const canvas = document.getElementById('snap-canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = dataUrl;
    }

    function handleUpload(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => resizeDataUrl(e.target.result, analyze);
      reader.readAsDataURL(file);
      input.value = '';
    }

    async function captureAndAnalyze() {
      if (!video.srcObject) return;
      await analyze(captureFrame());
    }

    // ── Tight prompt — fewer tokens = faster response ─────────────
    const PROMPT = `You are a card reader and blackjack strategy lookup tool.

STEP 1 — READ THE CARDS CAREFULLY:
- ACE = large letter "A". NOT a 4.
- FOUR = four pips arranged in a square. NOT an A.
- Face cards: J=Jack, Q=Queen, K=King (all worth 10).
- Check BOTH the corner index AND center pips to confirm each card.

STEP 2 — LOOK UP THE EXACT ACTION using this complete basic strategy table (6 decks, dealer stands soft 17):

PAIRS (always check splits first if player has two of the same card):
2,2 vs 2-7: SPLIT | 2,2 vs 8-A: HIT
3,3 vs 2-7: SPLIT | 3,3 vs 8-A: HIT
4,4 vs 5-6: SPLIT | 4,4 vs others: HIT
5,5: never split, treat as hard 10
6,6 vs 2-6: SPLIT | 6,6 vs 7-A: HIT
7,7 vs 2-7: SPLIT | 7,7 vs 8-A: HIT
8,8: always SPLIT
9,9 vs 2-6: SPLIT | 9,9 vs 7: STAND | 9,9 vs 8-9: SPLIT | 9,9 vs 10-A: STAND
10,10: always STAND
A,A: always SPLIT

SOFT TOTALS (hand contains an Ace counted as 11):
Soft 13 (A,2) vs 5-6: DOUBLE | otherwise: HIT
Soft 14 (A,3) vs 5-6: DOUBLE | otherwise: HIT
Soft 15 (A,4) vs 4-6: DOUBLE | otherwise: HIT
Soft 16 (A,5) vs 4-6: DOUBLE | otherwise: HIT
Soft 17 (A,6) vs 3-6: DOUBLE | otherwise: HIT
Soft 18 (A,7) vs 2-6: DOUBLE | vs 7-8: STAND | vs 9-10-A: HIT
Soft 19 (A,8) vs 6: DOUBLE | otherwise: STAND
Soft 20 (A,9): always STAND

HARD TOTALS:
Hard 8 or less: always HIT
Hard 9 vs 3-6: DOUBLE | otherwise: HIT
Hard 10 vs 2-9: DOUBLE | vs 10-A: HIT
Hard 11 vs 2-10: DOUBLE | vs A: HIT
Hard 12 vs 4-6: STAND | otherwise: HIT
Hard 13 vs 2-6: STAND | otherwise: HIT
Hard 14 vs 2-6: STAND | otherwise: HIT
Hard 15 vs 2-6: STAND | otherwise: HIT
Hard 16 vs 2-6: STAND | otherwise: HIT
Hard 17 or more: always STAND

STEP 3 — Reply ONLY valid JSON, no markdown:
{"player_cards":["A","7"],"player_total":"soft 18","dealer_upcard":"6","action":"DOUBLE","reason":"Soft 18 vs dealer 6 — always double per basic strategy"}
action = HIT | STAND | DOUBLE | SPLIT | UNCLEAR`;

    // ── Streaming analyze ─────────────────────────────────────────
    async function analyze(dataUrl) {
      const apiKey = document.getElementById('api-key').value.trim();
      if (!apiKey) { showError('Enter your Anthropic API key at the top first.'); return; }

      const base64 = dataUrl.split(',')[1];
      const mime   = dataUrl.split(';')[0].split(':')[1] || 'image/jpeg';

      // Show skeleton immediately so user sees feedback right away
      showSkeleton();

      let buffer = '';

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',  // Haiku: fastest + cheapest model
            max_tokens: 300,                       // Tight limit — our JSON is small
            stream: true,                          // Stream tokens as they arrive
            messages: [{
              role: 'user',
              content: [
                { type: 'image', source: { type: 'base64', media_type: mime, data: base64 } },
                { type: 'text', text: PROMPT }
              ]
            }]
          })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `API error ${res.status}`);
        }

        // Read the stream chunk by chunk
        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;

            try {
              const evt = JSON.parse(data);
              if (evt.type === 'content_block_delta' && evt.delta?.text) {
                buffer += evt.delta.text;
                // Try to show result as soon as we have valid JSON
                tryRenderPartial(buffer);
              }
            } catch { /* incomplete JSON chunk, keep buffering */ }
          }
        }

        // Final parse on complete buffer
        const clean = buffer.replace(/```json|```/g, '').trim();
        showResult(JSON.parse(clean));

      } catch (err) {
        showError(err.message || 'Something went wrong. Check your API key and try again.');
      }
    }

    // Try to parse and render as soon as action field arrives in the stream
    function tryRenderPartial(text) {
      try {
        const clean = text.replace(/```json|```/g, '').trim();
        // Only render if we at least have the action
        if (!clean.includes('"action"')) return;
        // Attempt full parse
        const r = JSON.parse(clean);
        showResult(r);
      } catch { /* not valid JSON yet — keep streaming */ }
    }

    // ── UI ────────────────────────────────────────────────────────
    function showSkeleton() {
      const card  = document.getElementById('result-card');
      const inner = document.getElementById('result-inner');
      card.style.display = 'block';
      inner.className = 'result-inner neutral';
      inner.innerHTML = `
        <div class="result-hands">
          <div class="hand-chip">Your hand &nbsp;<span>—</span></div>
          <div class="hand-chip">Dealer shows &nbsp;<span>—</span></div>
        </div>
        <div class="result-action streaming" style="color:var(--text-dim);font-size:1.4rem;padding-top:6px">Reading cards</div>
        <div class="result-reason" style="margin-top:6px"></div>`;
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showResult(r) {
      const inner  = document.getElementById('result-inner');
      const action = (r.action || 'UNCLEAR').toUpperCase();
      const colorMap = { HIT:'hit', STAND:'stand', DOUBLE:'double', SPLIT:'split' };
      const emojiMap = { HIT:'👊', STAND:'✋', DOUBLE:'💰', SPLIT:'✂️', UNCLEAR:'🔍' };
      const cls   = colorMap[action] || 'neutral';
      const emoji = emojiMap[action] || '❓';
      const cards = Array.isArray(r.player_cards) ? r.player_cards.join('  ') : '?';

      inner.className = `result-inner ${cls}`;
      inner.innerHTML = `
        <div class="result-hands">
          <div class="hand-chip">Your hand &nbsp;<span>${cards}</span></div>
          <div class="hand-chip">Dealer shows &nbsp;<span>${r.dealer_upcard || '?'}</span></div>
        </div>
        <div class="result-action">${emoji} ${action}</div>
        <div class="result-reason">${r.reason || ''}</div>`;
    }

    function showError(msg) {
      const card  = document.getElementById('result-card');
      const inner = document.getElementById('result-inner');
      card.style.display = 'block';
      inner.className = 'result-inner neutral';
      inner.innerHTML = `<div class="error-box">⚠️ ${msg}</div>`;
    }

    function toggleKey(e) {
      const inp = document.getElementById('api-key');
      if (inp.type === 'password') { inp.type = 'text';     e.target.textContent = 'Hide'; }
      else                         { inp.type = 'password'; e.target.textContent = 'Show'; }
    }
  </script>
</body>
</html>
